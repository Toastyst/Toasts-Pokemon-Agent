  heading: The Pattern
  original_word_count: 54
  script_word_count: 54
  duration: 20
  extend: true
  estimated_speech_seconds: 21.6
  script: 'Three stories, one thread: the infrastructure layer is catching up to the
    model layer.

    Anthropic''s policy fight is about who controls model access. Stack Overflow for
    Agents is about giving agents persistent knowledge. DiffusionGemma is about rethinking
    the fundamental decoding architecture.

    The models are the headline. The plumbing is where the actual leverage is.'
