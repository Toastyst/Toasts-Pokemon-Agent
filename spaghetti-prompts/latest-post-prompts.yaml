  estimated_speech_seconds: 19.6
  script: 'Google DeepMind dropped DiffusionGemma — a 26B parameter discrete diffusion
    language model built on the Gemma 4 backbone. It''s open weights , it''s on Hugging
    Face, and it''s the first diffusion LLM with native vLLM support. The pitch: up
    to 4x faster text generation by ditching autoregressive decoding entirely.'
